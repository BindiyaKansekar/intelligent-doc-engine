# azure-pipelines.yml
# ====================
# Azure DevOps CI/CD pipeline for the Intelligent Documentation Engine.
#
# Trigger: any commit or PR update for tracked source/documentation files.
# Steps:
#   1. Install Python dependencies
#   2. (Optional) Check out extra repos for multi-repo integration docs
#   3. Run the 4-phase doc engine pipeline (detects changes, generates .docx)
#   4. Publish generated documentation artifacts (.docx) to the ADO Wiki
#
# Required pipeline variables (set in Azure DevOps → Pipelines → Variables):
#   ANTHROPIC_API_KEY   — Claude API key (mark as secret)
#   ADO_ORG_URL         — e.g. https://dev.azure.com/myorg
#   ADO_PROJECT         — e.g. MyProject
#   ADO_WIKI_ID         — wiki identifier (from the wiki URL)
#   ADO_WIKI_PAGE_PATH  — wiki page path, e.g. /Documentation/AUD
#
# Required pipeline permission:
#   In Pipeline settings → enable "Allow scripts to access the OAuth token"
#   so that $(System.AccessToken) can authenticate against the Wiki REST API.
#
# ─── New-integration parameters ───────────────────────────────────────────
#
# When a developer ships a new external system integration, run the pipeline
# manually and set these parameters to get full integration documentation:
#
#   newIntegration    true
#   extraRepoPaths    (optional) semicolon-separated  path|branch  pairs
#                     pointing to additional already-checked-out repos whose
#                     PR changes should be included in the end-to-end doc.
#                     Example:  $(Pipeline.Workspace)/repo-b|feature/payment;
#                               $(Pipeline.Workspace)/repo-c
#
# The pipeline will generate a single document containing:
#   • Standard AUD sections (overview, data flows, dependencies, etc.)
#   • Integration Overview  — purpose, external system, auth, SLA
#   • Sequence Diagram      — end-to-end Mermaid sequence diagram (embedded PNG)
#   • API & Field Mapping   — endpoint/field table (inbound + outbound)
#   • Error & Retry         — timeouts, retries, dead-letter, alerting

parameters:
  - name: newIntegration
    type: boolean
    default: false
    displayName: "New Integration (generate full integration docs)"

  - name: extraRepoPaths
    type: string
    default: ""
    displayName: "Extra repo paths for multi-repo integration (semicolon-separated path|branch)"

  - name: project
    type: string
    default: ""
    displayName: "Run for a specific project only (leave blank for all)"

trigger:
  branches:
    include:
      - "*"
  paths:
    include:
      - src/**
      - config.json
      - templates/**
      - scripts/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - "*"
  paths:
    include:
      - src/**
      - config.json
      - templates/**
      - scripts/**
      - azure-pipelines.yml

pool:
  vmImage: ubuntu-latest

variables:
  PYTHON_VERSION: "3.11"

steps:

  - checkout: self
    persistCredentials: true
    fetchDepth: 0

  # ─── Setup ────────────────────────────────────────────────────────────────

  - task: UsePythonVersion@0
    displayName: "Use Python $(PYTHON_VERSION)"
    inputs:
      versionSpec: "$(PYTHON_VERSION)"
      addToPath: true

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: "Install Python dependencies"
    workingDirectory: $(Build.SourcesDirectory)

  # ─── Run the documentation pipeline ──────────────────────────────────────
  # Flags are driven by pipeline parameters; env-var fallbacks allow local runs.
  # --new-integration  → generates Integration Overview, Sequence Diagram,
  #                      API & Field Mapping, Error & Retry sections
  # --extra-repos      → semicolon-separated path|branch for multi-repo PRs

  - script: |
      ARGS=""
      if [ "$NEW_INTEGRATION" = "True" ] || [ "$NEW_INTEGRATION" = "true" ]; then
        ARGS="$ARGS --new-integration"
      fi
      if [ -n "$EXTRA_REPO_PATHS" ]; then
        ARGS="$ARGS --extra-repos \"$EXTRA_REPO_PATHS\""
      fi
      if [ -n "$PROJECT_FILTER" ]; then
        ARGS="$ARGS --project \"$PROJECT_FILTER\""
      fi
      eval python -m src.runner $ARGS
    displayName: "Run intelligent-doc-engine (4-phase pipeline)"
    workingDirectory: $(Build.SourcesDirectory)
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      NEW_INTEGRATION: ${{ parameters.newIntegration }}
      EXTRA_REPO_PATHS: ${{ parameters.extraRepoPaths }}
      PROJECT_FILTER: ${{ parameters.project }}

  # ─── Publish to Azure DevOps Wiki ─────────────────────────────────────────

  - script: python scripts/publish_to_wiki.py
    displayName: "Publish .docx to Azure DevOps Wiki"
    workingDirectory: $(Build.SourcesDirectory)
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      ADO_ORG_URL: $(ADO_ORG_URL)
      ADO_PROJECT: $(ADO_PROJECT)
      ADO_WIKI_ID: $(ADO_WIKI_ID)
      ADO_WIKI_PAGE_PATH: $(ADO_WIKI_PAGE_PATH)

  # ─── Publish artifacts (optional — keeps the .docx in the pipeline run) ──

  # ─── Analytics PR documentation (scan-pr mode) ───────────────────────────
  # Set analyticsRepoPr and analyticsRepoSlug to scan a data engineering PR
  # (Snowflake/SQL, ADF, Azure Functions) and post Markdown docs as a comment.

  - script: |
      if [ -n "$ANALYTICS_PR_NUMBER" ] && [ -n "$ANALYTICS_REPO_SLUG" ]; then
        echo "Running analytics scan for PR #$ANALYTICS_PR_NUMBER on $ANALYTICS_REPO_SLUG"
        python -m src.analytics_runner scan-pr \
          --provider github \
          --repo "$ANALYTICS_REPO_SLUG" \
          --pr "$ANALYTICS_PR_NUMBER" \
          --output analytics-pr-docs.md
        # Post as PR comment via gh CLI
        gh pr comment "$ANALYTICS_PR_NUMBER" \
          --repo "$ANALYTICS_REPO_SLUG" \
          --body-file analytics-pr-docs.md || true
      else
        echo "ANALYTICS_PR_NUMBER or ANALYTICS_REPO_SLUG not set — skipping analytics scan."
      fi
    displayName: "Analytics PR scan (optional)"
    workingDirectory: $(Build.SourcesDirectory)
    condition: always()
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      ANALYTICS_PR_NUMBER: $(ANALYTICS_PR_NUMBER)
      ANALYTICS_REPO_SLUG: $(ANALYTICS_REPO_SLUG)
      GH_TOKEN: $(GH_TOKEN)

  - task: PublishPipelineArtifact@1
    displayName: "Archive generated documents"
    condition: succeededOrFailed()
    inputs:
      targetPath: $(Build.SourcesDirectory)/output
      artifact: generated-docs
      publishLocation: pipeline
